<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block titulo %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="d-flex">

    <!-- menu lateral-->
    <div class="sidebar p-3">

        <!-- logo -->
        <div class="d-flex align-items-center mb-4 logo">
            <img src="/static/img/logotipo.png"
                 alt="logo"
                 class="logo-img me-2">
        </div>

        <!-- nombre usuario -->
        <div class="usuario mb-3">
            <i class="fa-solid fa-circle-user"></i> 
        </div>

        <!-- menu -->
        <a href="#" class="menu-item"><i class="fa-solid fa-circle-plus"></i> Añadir tarea</a>
        <a href="#" class="menu-item"><i class="fa-solid fa-inbox"></i> Bandeja</a>
        <a href="/logout" class="menu-item"><i class="fa-solid fa-arrow-right-from-bracket"></i> Cerrar sesión</a>

    </div>

    <!-- contenido  -->
    <div class="flex-grow-1 padding">
        {% block contenido %}
        {% endblock %}
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
